<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>中秋活动报名</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #fceabb, #f8b500);
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 { color: #333; margin-bottom: 10px; }
    #qrcode-container {
      text-align: center;
      margin-bottom: 30px;
    }
    #qrcode {
      margin: 10px auto;
      padding: 10px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.15);
      display: inline-block;
    }
    #downloadQR {
      margin-top: 10px;
      padding: 8px 15px;
      background: #f8b500;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    #downloadQR:hover { background: #e09e00; }
    form {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }
    label { display: block; margin-top: 10px; font-weight: bold; }
    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 16px;
    }
    button[type="submit"] {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      background: #f8b500;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 18px;
      cursor: pointer;
    }
    button[type="submit"]:hover { background: #e09e00; }
    #successMessage {
      margin-top: 20px;
      color: green;
      font-size: 16px;
      text-align: center;
    }
  </style>
</head>
<body>

  <h1>📱 中秋活动报名</h1>

  <div id="qrcode-container">
    <div id="qrcode"></div>
    <br>
    <button id="downloadQR">📥 下载二维码</button>
    <p>扫描二维码即可打开本报名页面</p>
  </div>

  <form id="entryForm">
    <label for="name">姓名（必填）</label>
    <input type="text" id="name" required>

    <label for="voucher">固本号码（必填）</label>
    <input type="text" id="voucher" required>

    <button type="submit">提交报名</button>
  </form>

  <div id="successMessage"></div>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAjxv9FWHnZ5_kHyK7VQqSLYLKarP2OVEo",
      databaseURL: "https://yeee-97630-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 生成二维码
    const currentURL = window.location.href.split('?')[0];
    const qrCodeDiv = document.getElementById("qrcode");
    const qr = new QRCode(qrCodeDiv, { text: currentURL, width: 180, height: 180 });

    document.getElementById('downloadQR').addEventListener('click', () => {
      const img = qrCodeDiv.querySelector('img');
      const link = document.createElement('a');
      link.href = img.src;
      link.download = '报名二维码.png';
      link.click();
    });

    document.getElementById('entryForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const voucher = document.getElementById('voucher').value.trim();
      if (!name || !voucher) {
        alert('请填写完整信息');
        return;
      }
      const newEntryRef = database.ref('entries').push();
      newEntryRef.set({
        name: name,
        voucher: voucher
      }).then(() => {
        document.getElementById('successMessage').textContent = '✅ 报名成功！';
        e.target.reset();
        setTimeout(() => document.getElementById('successMessage').textContent = '', 3000);
      });
    });
  </script>

</body>
</html>
